<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OS - Dog Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="day-mode">
    <div id="dog-cursor">🐶</div>

    <div class="phone-container">
        <section id="landing">
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="A small place I made for you.">A small place I made for you.</h1>
            </div>
            <p class="sub-text">Encrypted Connection Established...</p>
            <button id="start-btn" class="neon-btn">INITIALIZE</button>
        </section>

        <main id="app" class="hidden">
            <header class="os-header">
                <div class="status-left">19:24 <span class="blink">●</span></div>
                <div class="status-center">Dog System v1.0</div>
                <div class="status-right">5G 🔋</div>
            </header>

            <div class="float-notes">
                <div class="note-tag">Notes</div>
                <div class="note-content">
                    <p>• drink water</p>
                    <p>• don't skip meals</p>
                    <p>• i'm proud of you</p>
                </div>
            </div>

            <div class="chat-area" id="chat-box">
                </div>

            <footer class="input-bar">
                <div id="interaction-layer">
                    <div id="treat-btn" class="hidden pulse-btn">🍖 Feed Meat</div>
                    <div id="ask-btn" class="hidden ghost-btn">how are you?</div>
                </div>
                <div class="input-placeholder">System encrypted...</div>
            </footer>

            <div class="diary-overlay" id="diary">
                <span class="close-diary">×</span>
                <h4>Dog Diary</h4>
                <p>Day 12: she seemed a little tired today. i wish i could sit next to her.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
